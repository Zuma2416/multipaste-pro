name: MultiPaste Pro リリース

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースするバージョン (例: 0.2.0)'
        required: true
      release_notes:
        description: 'リリースノート'
        required: false
        default: 'バグ修正・改善'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - name: Update version in package.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Update version in tauri.conf.json
        working-directory: src-tauri
        run: |
          VERSION="${{ github.event.inputs.version }}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Update version in Cargo.toml
        working-directory: src-tauri
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build (macOS aarch64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target aarch64-apple-darwin

      - name: List bundle contents
        run: |
          echo "=== Bundle directory contents ==="
          find src-tauri/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "Bundle dir not found"

      - name: Prepare release assets
        id: assets
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          # Find built artifacts
          APP_TAR=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" 2>/dev/null | head -1)
          APP_SIG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" 2>/dev/null | head -1)

          echo "Found APP_TAR: $APP_TAR"
          echo "Found APP_SIG: $APP_SIG"
          echo "Found DMG: $DMG"

          # Validate required files
          if [ -z "$APP_TAR" ]; then
            echo "ERROR: .app.tar.gz not found. Updater bundle may not have been generated."
            echo "Check that TAURI_SIGNING_PRIVATE_KEY is set and updater plugin is configured."
            exit 1
          fi

          echo "app_tar=$APP_TAR" >> "$GITHUB_OUTPUT"
          echo "app_sig=$APP_SIG" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

          # Read signature for latest.json (if sig exists)
          if [ -n "$APP_SIG" ]; then
            SIGNATURE=$(cat "$APP_SIG")
          else
            echo "WARNING: Signature file not found. Updater signing may have failed."
            SIGNATURE=""
          fi
          APP_FILENAME=$(basename "$APP_TAR")

          # Generate latest.json
          node -e "
            const fs = require('fs');
            const json = {
              version: '$VERSION',
              notes: '${{ github.event.inputs.release_notes }}',
              pub_date: new Date().toISOString(),
              platforms: {
                'darwin-aarch64': {
                  signature: '$SIGNATURE',
                  url: 'https://github.com/Zuma2416/multipaste-pro/releases/download/v$VERSION/$APP_FILENAME'
                }
              }
            };
            fs.writeFileSync('latest.json', JSON.stringify(json, null, 2) + '\n');
          "

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ASSETS=()
          [ -n "${{ steps.assets.outputs.app_tar }}" ] && ASSETS+=("${{ steps.assets.outputs.app_tar }}")
          [ -n "${{ steps.assets.outputs.app_sig }}" ] && ASSETS+=("${{ steps.assets.outputs.app_sig }}")
          [ -n "${{ steps.assets.outputs.dmg }}" ] && ASSETS+=("${{ steps.assets.outputs.dmg }}")
          ASSETS+=("latest.json")

          gh release create "v$VERSION" \
            --title "MultiPaste Pro v$VERSION" \
            --notes "${{ github.event.inputs.release_notes }}" \
            "${ASSETS[@]}"

      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: MultiPaste Pro v${{ github.event.inputs.version }} リリースマニフェスト更新"
          file_pattern: "src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml"
          branch: main
