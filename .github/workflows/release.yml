name: MultiPaste Pro リリース

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースするバージョン (例: 0.2.0)'
        required: true
      release_notes:
        description: 'リリースノート'
        required: false
        default: 'バグ修正・改善'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - name: Update version in package.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Update version in tauri.conf.json
        working-directory: src-tauri
        run: |
          VERSION="${{ github.event.inputs.version }}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Update version in Cargo.toml
        working-directory: src-tauri
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Verify signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY secret is not set."
            echo "Go to Settings > Secrets > Actions and add the signing private key."
            exit 1
          fi
          echo "Signing key is set (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"

      - name: Build (macOS aarch64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target aarch64-apple-darwin

      - name: Import code signing certificate
        env:
          CODESIGN_CERT_BASE64: ${{ secrets.CODESIGN_CERT_BASE64 }}
          CODESIGN_CERT_PASSWORD: ${{ secrets.CODESIGN_CERT_PASSWORD }}
        run: |
          if [ -z "$CODESIGN_CERT_BASE64" ]; then
            echo "WARNING: CODESIGN_CERT_BASE64 not set, skipping code signing."
            echo "signed=false" >> "$GITHUB_ENV"
            exit 0
          fi

          # 一時キーチェーン作成
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="ci-keychain-$(date +%s)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # 証明書デコード・インポート
          echo "$CODESIGN_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # 検索リストに追加
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "signed=true" >> "$GITHUB_ENV"
          echo "Code signing certificate imported."

      - name: Sign app bundle
        if: env.signed == 'true'
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/MultiPaste Pro.app"
          codesign --force --deep --sign "MultiPaste Pro Dev" "$APP_PATH"
          echo "App signed with MultiPaste Pro Dev certificate."

      - name: Rebuild DMG with signed app
        if: env.signed == 'true'
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          DMG_PATH=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          APP_PATH="$BUNDLE_DIR/macos/MultiPaste Pro.app"

          if [ -n "$DMG_PATH" ] && [ -d "$APP_PATH" ]; then
            # 既存DMGを削除して再作成
            rm -f "$DMG_PATH"
            DMG_NAME=$(basename "$DMG_PATH")
            hdiutil create -volname "MultiPaste Pro" -srcfolder "$APP_PATH" -ov -format UDZO "$BUNDLE_DIR/dmg/$DMG_NAME"
            echo "DMG rebuilt with signed app."
          fi

      - name: List bundle contents
        run: |
          echo "=== Bundle directory contents ==="
          find src-tauri/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "Bundle dir not found"

      - name: Prepare release assets
        id: assets
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          # Find built artifacts
          APP_TAR=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" 2>/dev/null | head -1)
          APP_SIG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" 2>/dev/null | head -1)

          echo "Found APP_TAR: $APP_TAR"
          echo "Found APP_SIG: $APP_SIG"
          echo "Found DMG: $DMG"

          # Validate required files
          if [ -z "$APP_TAR" ]; then
            echo "ERROR: .app.tar.gz not found. Updater bundle may not have been generated."
            echo "Check that TAURI_SIGNING_PRIVATE_KEY is set and updater plugin is configured."
            exit 1
          fi

          echo "app_tar=$APP_TAR" >> "$GITHUB_OUTPUT"
          echo "app_sig=$APP_SIG" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

          # Read signature for latest.json (if sig exists)
          if [ -n "$APP_SIG" ]; then
            SIGNATURE=$(cat "$APP_SIG")
          else
            echo "WARNING: Signature file not found. Updater signing may have failed."
            SIGNATURE=""
          fi
          APP_FILENAME=$(basename "$APP_TAR")

          # Generate latest.json
          node -e "
            const fs = require('fs');
            const json = {
              version: '$VERSION',
              notes: '${{ github.event.inputs.release_notes }}',
              pub_date: new Date().toISOString(),
              platforms: {
                'darwin-aarch64': {
                  signature: '$SIGNATURE',
                  url: 'https://github.com/Zuma2416/multipaste-pro/releases/download/v$VERSION/$APP_FILENAME'
                }
              }
            };
            fs.writeFileSync('latest.json', JSON.stringify(json, null, 2) + '\n');
          "

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ASSETS=()
          [ -n "${{ steps.assets.outputs.app_tar }}" ] && ASSETS+=("${{ steps.assets.outputs.app_tar }}")
          [ -n "${{ steps.assets.outputs.app_sig }}" ] && ASSETS+=("${{ steps.assets.outputs.app_sig }}")
          [ -n "${{ steps.assets.outputs.dmg }}" ] && ASSETS+=("${{ steps.assets.outputs.dmg }}")
          ASSETS+=("latest.json")

          gh release create "v$VERSION" \
            --title "MultiPaste Pro v$VERSION" \
            --notes "${{ github.event.inputs.release_notes }}" \
            "${ASSETS[@]}"

      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: MultiPaste Pro v${{ github.event.inputs.version }} リリースマニフェスト更新"
          file_pattern: "src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml"
          branch: main
